name: 定时器保镖

on:
  schedule:
    # 每30分钟检查一次（北京时间）
    # 工作日 08:00-11:30 → 检查早报
    # 工作日 14:00-16:30 → 检查午报
    - cron: '0,30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - guardian-check

env:
  TZ: Asia/Shanghai
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 检查并发送报告
        env:
          REPO: azxiaoxie009/stock-reporter
          WF_ID: "261572052"
        run: |
          # 用 GH_PAT 认证 gh CLI
          echo "$GH_TOKEN" | gh auth login --hostname github.com --with-token

          python3 << 'PYEOF'
import subprocess, json, datetime
from datetime import timezone, timedelta

REPO = "azxiaoxie009/stock-reporter"
WF_ID = "261572052"

def get_cst():
    return datetime.datetime.now(timezone(timedelta(hours=8)))

now = get_cst()
weekday = now.weekday()
hour, minute = now.hour, now.minute
today_str = now.strftime("%Y-%m-%d")

is_workday = weekday < 5
is_weekend = weekday >= 5

is_morning_window = (hour == 8) or (9 <= hour <= 10) or (hour == 11 and minute < 30)
is_afternoon_window = (hour == 14) or (hour == 15) or (hour == 16 and minute < 30)

print(f"[保镖] {now.strftime('%H:%M')} 周{weekday+1} 工作日={is_workday} "
      f"早={is_morning_window} 午={is_afternoon_window} 触发={os.environ.get('GITHUB_EVENT_NAME','?')}")

if is_weekend:
    print("[保镖] 周末，跳过")
    exit(0)

import os
try:
    res = subprocess.run(
        ['gh', 'api', f'repos/{REPO}/actions/workflows/{WF_ID}/runs?per_page=3'],
        capture_output=True, text=True, check=True
    )
    runs = json.loads(res.stdout).get('workflow_runs', [])

    today_success = None
    for r in runs:
        created = r.get('created_at', '')[:10]
        if created == today_str and r.get('conclusion') == 'success':
            today_success = r
            break

    if today_success:
        evt = today_success.get('event', 'unknown')
        t = today_success.get('created_at', '')
        print(f"[保镖] 今天已有成功运行: [{evt}] at {t}")
    else:
        print("[保镖] 今天尚无成功运行记录")
        today_success = None

except subprocess.CalledProcessError as e:
    print(f"[保镖] API 调用失败: {e.stderr[:200]}")
    today_success = None

if is_morning_window:
    if today_success:
        print("[保镖] ✅ 早报已发出，无需操作")
    else:
        print("[保镖] ⚠️ 早报漏发！触发补发...")
        r = subprocess.run(
            ['gh', 'workflow', 'run', 'stock-report.yml',
             '--field', 'mode=morning', '--repo', REPO],
            capture_output=True, text=True
        )
        if r.returncode == 0:
            print("[保镖] ✅ 早报补发成功")
        else:
            print(f"[保镖] ❌ 补发失败: {r.stderr[:300]}")

elif is_afternoon_window:
    try:
        res2 = subprocess.run(
            ['gh', 'api', f'repos/{REPO}/actions/workflows/{WF_ID}/runs?per_page=10'],
            capture_output=True, text=True, check=True
        )
        runs2 = json.loads(res2.stdout).get('workflow_runs', [])
        afternoon_done = any(
            r.get('created_at', '')[:10] == today_str and
            r.get('created_at', '') >= today_str + "T06:00:00Z" and
            r.get('conclusion') == 'success'
            for r in runs2
        )
    except Exception:
        afternoon_done = False

    if afternoon_done:
        print("[保镖] ✅ 今日午报已发出（或早报已完成），无需操作")
    else:
        print("[保镖] ⚠️ 午报时间窗口，检查是否需要发送...")
        r = subprocess.run(
            ['gh', 'workflow', 'run', 'stock-report.yml',
             '--field', 'mode=afternoon', '--repo', REPO],
            capture_output=True, text=True
        )
        if r.returncode == 0:
            print("[保镖] ✅ 午报触发成功")
        else:
            print(f"[保镖] ❌ 午报触发失败: {r.stderr[:300]}")

else:
    print(f"[保镖] 不在检查窗口（{hour}:{minute:02d}），跳过")
PYEOF