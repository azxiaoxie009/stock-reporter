name: A股早晚报

on:
  # 手动触发（测试用）
  workflow_dispatch:
    inputs:
      mode:
        description: '发送模式 (morning / afternoon)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

  # 定时触发（北京时间 = UTC+8）
  # 早报 08:45 北京 → UTC 00:45
  # 盘尾 14:45 北京 → UTC 06:45
  schedule:
    - cron: '45 0 * * 1-5'   # 周一至五 08:45 北京 = 00:45 UTC
    - cron: '45 6 * * 1-5'   # 周一至五 14:45 北京 = 06:45 UTC

env:
  TZ: Asia/Shanghai
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  # 早报 (手动 morning / 定时第一个)
  morning:
    if: github.event_name != 'schedule' && github.event.inputs.mode == 'morning' || github.event.schedule == '45 0 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python generate_report.py morning

  # 盘尾简报 (手动 afternoon / 定时第二个)
  afternoon:
    if: github.event_name != 'schedule' && github.event.inputs.mode == 'afternoon' || github.event.schedule == '45 6 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python generate_report.py afternoon
