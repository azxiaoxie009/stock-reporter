name: A股报告自动化

on:
  schedule:
    # 工作日 08:45 北京时间 = UTC 00:45，周一至五
    - cron: '45 0 * * 1-5'
    # 周末 08:45 北京时间 = UTC 00:45，周六、周日
    - cron: '45 0 * * 0,6'
  workflow_dispatch:  # 手动触发

env:
  TZ: Asia/Shanghai

jobs:
  morning-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python3 generate_report.py morning

  afternoon-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python3 generate_report.py afternoon

  weekend-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python3 generate_report.py weekend
