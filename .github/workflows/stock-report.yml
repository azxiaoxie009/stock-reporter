name: A股报告自动化

on:
  schedule:
    # 工作日 08:45 北京时间 = UTC 00:45
    - cron: '45 0 * * 1-5'
    # 工作日 14:45 北京时间 = UTC 06:45
    - cron: '45 6 * * 1-5'
    # 周末 08:45 北京时间 = UTC 00:45
    - cron: '45 0 * * 0,6'
  workflow_dispatch:
    inputs:
      mode:
        description: '报告类型 morning | afternoon | weekend'
        required: false
        default: 'morning'

env:
  TZ: Asia/Shanghai

jobs:
  stock-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - run: pip install requests

      # 根据触发方式决定报告类型：
      # 定时触发(08:45 UTC) + 周末 → 早报/周末
      # 定时触发(14:45 UTC)       → 下午收盘报告
      - name: 发送早报
        if: github.event_name == 'schedule' && github.event.schedule == '45 0 * * 1-5'
        run: python3 generate_report.py morning

      - name: 发送下午收盘报告
        if: github.event_name == 'schedule' && github.event.schedule == '45 6 * * 1-5'
        run: python3 generate_report.py afternoon

      - name: 发送周末报告
        if: github.event_name == 'schedule' && (github.event.schedule == '45 0 * * 0' || github.event.schedule == '45 0 * * 6')
        run: python3 generate_report.py weekend

      - name: 手动触发报告
        if: github.event_name == 'workflow_dispatch'
        run: python3 generate_report.py ${{ github.event.inputs.mode || 'morning' }}
